<!DOCTYPE html>
<html>
<head>
  <title>Melate - Syntax Check</title>
  <script>
    // This file will check for syntax errors by attempting to load all scripts
    console.log('Starting syntax check...');
  </script>
</head>
<body>
  <div id="test">Loading scripts...</div>
  
  <script src="data.js"></script>
  <script src="engine.js"></script>
  <script src="ui.js"></script>
  
  <script>
    console.log('All scripts loaded successfully!');
    
    // Check if key functions exist
    const functionsToCheck = [
      'computeAdvancedScore',
      'generateComboSuggestions',
      'calculateFrequentPairScore',
      'showLoadingModal',
      'updateLoadingProgress',
      'cancelSimulation',
      'evalUserComboUI',
      'evalSuggestion'
    ];
    
    const results = {};
    functionsToCheck.forEach(fname => {
      results[fname] = typeof window[fname] === 'function' ? '✓' : '✗';
    });
    
    document.getElementById('test').innerHTML = '<pre>' + 
      'Syntax Check Results:\n' + 
      Object.entries(results).map(([name, status]) => `${status} ${name}`).join('\n') +
      '</pre>';
    
    console.log(results);
  </script>
</body>
</html>
