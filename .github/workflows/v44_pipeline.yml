name: V4.4 pipeline auto-refresh

on:
  schedule:
    - cron: '0 9 * * 1,4,6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run V4.4 pipeline
        run: python tools/v4_refresh.py --game revancha --scrape --reconstruct --full-signals --recent-composition --construct

      - name: Run smoke test
        run: python tools/v4_hybrid_composition_smoke_test.py

      - name: Commit generated artifacts if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add revancha.csv
          git add v4_scraper_raw.csv
          git add v4_scraper_report.json
          git add v4_csv_reconstruction_report.json
          git add v4_history_matrix.json
          git add v4_gap_echo_output.json
          git add v4_signature_history.json
          git add v4_pair_lag_signals.json
          git add v4_block_completion_signals.json
          git add v4_winner_profile.json
          git add v4_recent_composition_profile.json
          git add v4_combination_slate.json
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore: pipeline V4.4 auto-refresh [skip ci]"
            git push
          fi
